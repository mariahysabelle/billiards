<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/style.css">
<title>Continuous Billiards Game</title>
<style>
body { margin: 0; background: #222; color: white; font-family: Arial; }
input, button { font-size: 16px; }
#scoreDisplay { position:absolute; top:10px; left:10px; font-size:18px; }
</style>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" style="position:absolute; width:100%; height:100%; background:#222; display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <h2>Enter Username</h2>
    <input type="text" id="usernameInput" placeholder="Username" style="padding:8px;">
    <button id="startBtn" style="margin-top:10px; padding:8px 16px;">Start Game</button>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen" style="display:none; position:relative;">
    <canvas id="table" width="800" height="400"></canvas>
    <div id="scoreDisplay"></div>
  </div>

<script src="../js/script.js"></script>
</body>
</html>
